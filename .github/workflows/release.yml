name: Release

# Build the `heron` executable (Linux + macOS) and the PDF report, then attach
# all three to the GitHub release.
#
# Trigger: push a tag like `v1.0`.  e.g.
#     git tag v1.0 && git push origin v1.0
# (softprops/action-gh-release creates the release for the tag if it does not exist yet.)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  heron-binary:
    name: Build heron (${{ matrix.asset }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: heron-linux-x86_64
          - os: macos-latest
            asset: heron-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Installs elan + the toolchain from `lean-toolchain`, fetches the Mathlib
      # cache, and runs the default `lake build` (the library).
      - name: Set up Lean and fetch Mathlib cache
        uses: leanprover/lean-action@v1

      # Compile the command-line program to a native binary.
      - name: Build the executable
        run: lake build heron

      - name: Stage binary
        run: |
          mkdir -p dist
          cp .lake/build/bin/heron "dist/${{ matrix.asset }}"

      - name: Upload binary as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  pdf-report:
    name: Build report.pdf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Runs `latexmk` inside a TeX Live container; the .latexmkrc is honoured,
      # so the PDF is produced at document/build/report.pdf.
      - name: Compile the LaTeX report
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: document
          root_file: report.tex

      - name: Upload PDF as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: document/build/report.pdf
          if-no-files-found: error

  publish:
    name: Attach assets to the release
    needs: [heron-binary, pdf-report]
    # Only publish for real tag pushes (skip manual workflow_dispatch runs, which have no tag).
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List collected assets
        run: find artifacts -type f

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
