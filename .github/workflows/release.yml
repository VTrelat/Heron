name: Release

# Build and publish a release. Two ways to trigger:
#   * push a tag:     git tag v1.0 && git push origin v1.0
#   * "Run workflow"  (Actions tab -> Release -> Run workflow) and type the tag, e.g. v1.0
#
# In one job on one runner it:
#   (i)   compiles the project and builds the `heron` executable,
#   (ii)  builds the LaTeX report with latexmk,
#   (iii) creates the release and uploads both assets.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create for this release (e.g. v1.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # (i) Compile the project: lean-action installs elan + the toolchain, fetches the
      #     Mathlib cache, and runs `lake build`; then we build the executable. Both share
      #     the same .lake on this runner, so the project is compiled only once.
      - name: Set up Lean and compile the project
        uses: leanprover/lean-action@v1
      - name: Build the heron executable
        run: lake build heron

      # (ii) Build the document with latexmk (honours document/.latexmkrc, which writes
      #      the PDF to document/build/report.pdf).
      - name: Build the PDF with latexmk
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: document
          root_file: report.tex

      - name: Collect the two assets
        run: |
          mkdir -p dist
          cp .lake/build/bin/heron     dist/heron
          cp document/build/report.pdf dist/report.pdf

      # (iii) Create the release (for the pushed tag, or the tag typed for a manual run)
      #       and upload both assets.
      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/heron
            dist/report.pdf
          fail_on_unmatched_files: true
          generate_release_notes: true
