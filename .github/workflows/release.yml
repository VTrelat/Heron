name: Release

# On a version tag (e.g. v1.0), in a single job on a single runner:
#   (i)   compile the project and build the `heron` executable,
#   (ii)  build the LaTeX report with latexmk,
#   (iii) create the release and upload both assets.
#
#     git tag v1.0 && git push origin v1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # (i) Compile the project: lean-action installs elan + the toolchain, fetches the
      #     Mathlib cache, and runs `lake build`; then we build the executable. Both share
      #     the same .lake on this runner, so the project is compiled only once.
      - name: Set up Lean and compile the project
        uses: leanprover/lean-action@v1
      - name: Build the heron executable
        run: lake build heron

      # (ii) Build the document with latexmk (honours document/.latexmkrc, which writes
      #      the PDF to document/build/report.pdf).
      - name: Build the PDF with latexmk
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: document
          root_file: report.tex

      - name: Collect the two assets
        run: |
          mkdir -p dist
          cp .lake/build/bin/heron     dist/heron
          cp document/build/report.pdf dist/report.pdf

      # (iii) Create the release and upload both (skipped on manual dispatch — it has no tag).
      - name: Create release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/heron
            dist/report.pdf
          fail_on_unmatched_files: true
          generate_release_notes: true
