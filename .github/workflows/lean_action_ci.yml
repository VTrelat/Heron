name: Lean Action CI

on:
  push:
    branches: ['**']   # all branches, but NOT tags — releases are handled by release.yml
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
